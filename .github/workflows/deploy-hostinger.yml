# Déploie sur Hostinger : FTP (21) puis SFTP (65002) si le FTP échoue.
# Secrets : FTP_HOST, FTP_USERNAME, FTP_PASSWORD
# Optionnel : FTP_REMOTE_DIR (défaut : domains/casadessert.fr/public_html)
name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier les secrets FTP
        run: |
          missing=0
          if [ -z "${{ secrets.FTP_HOST }}" ]; then
            echo "::error::Secret FTP_HOST manquant"
            missing=1
          fi
          if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
            echo "::error::Secret FTP_USERNAME manquant"
            missing=1
          fi
          if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            echo "::error::Secret FTP_PASSWORD manquant"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
          HOST="${{ secrets.FTP_HOST }}"
          if echo "$HOST" | grep -qE '://|/'; then
            echo "::error::FTP_HOST = IP ou hostname seul (ex. 72.60.93.210), sans ftp://"
            exit 1
          fi
          echo "Secrets OK."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Chemin distant (public_html)
        id: remote
        run: |
          DIR="${{ secrets.FTP_REMOTE_DIR }}"
          if [ -z "$DIR" ]; then
            DIR="domains/casadessert.fr/public_html"
          fi
          DIR="${DIR#/}"
          DIR="${DIR%/}"
          echo "dir=${DIR}" >> "$GITHUB_OUTPUT"
          echo "ftp_dir=${DIR}/" >> "$GITHUB_OUTPUT"
          echo "sftp_path=/${DIR}/" >> "$GITHUB_OUTPUT"
          echo "Cible : /${DIR}/ (pas la racine du compte FTP)"

      - name: Deploy via FTP (port 21)
        id: ftp
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          local-dir: ./
          server-dir: ${{ steps.remote.outputs.ftp_dir }}
          timeout: 600000
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.cursor/**
            **/a-telecharger/**
            **/tools/**
            **/.env
            **/.env.*
            config/config.php
            config/*.local.php
            **/database*.sql
            admin.html
            index.html
            sync-from-github.php
            verification-installation.php
            once-set-admin-password.php

      - name: Deploy via SFTP (port 65002, Hostinger)
        id: sftp
        if: steps.ftp.outcome == 'failure'
        continue-on-error: true
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_HOST }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 65002
          local_path: './'
          remote_path: ${{ steps.remote.outputs.sftp_path }}
          sftp_only: true
          sftpArgs: '-o ConnectTimeout=60 -o StrictHostKeyChecking=no'
          rsyncArgs: >-
            --exclude=.git
            --exclude=.github
            --exclude=node_modules
            --exclude=.cursor
            --exclude=a-telecharger
            --exclude=tools
            --exclude=config/config.php
            --exclude=*.local.php
            --exclude=sync-from-github.php
            --exclude=verification-installation.php
            --exclude=once-set-admin-password.php

      - name: Échec si FTP et SFTP ont échoué
        if: steps.ftp.outcome == 'failure' && steps.sftp.outcome == 'failure'
        run: |
          echo "::error::FTP (21) et SFTP (65002) ont échoué."
          exit 1

      - name: Méthode utilisée
        run: |
          if [ "${{ steps.ftp.outcome }}" = "success" ]; then
            echo "Upload via FTP → ${{ steps.remote.outputs.ftp_dir }}"
          else
            echo "Upload via SFTP → ${{ steps.remote.outputs.sftp_path }}"
          fi

      - name: Vérifier casadessert.fr (health.php)
        run: |
          sleep 8
          BODY=$(curl -fsSL --max-time 30 "https://casadessert.fr/health.php?t=$(date +%s)" || echo "CURL_FAILED")
          echo "$BODY"
          if echo "$BODY" | grep -q "deploy-version=MANQUANT"; then
            echo "::error::Le site n'a pas deploy-version — fichiers probablement hors public_html."
            echo "Dans GitHub Secrets, essayez FTP_REMOTE_DIR = public_html ou domains/casadessert.fr/public_html"
            exit 1
          fi
          if ! echo "$BODY" | grep -qi "OK.*devis.php"; then
            echo "::error::devis.php toujours absent sur le serveur web."
            exit 1
          fi
          if echo "$BODY" | grep -q "7018 octets"; then
            echo "::error::index.php encore en 7018 octets (ancienne version)."
            exit 1
          fi
          echo "Site en ligne à jour."
