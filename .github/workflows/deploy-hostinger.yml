# Déploie sur Hostinger par FTP (secrets : FTP_HOST, FTP_USERNAME, FTP_PASSWORD).
name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier les secrets FTP
        run: |
          missing=0
          if [ -z "${{ secrets.FTP_HOST }}" ]; then
            echo "::error::Secret FTP_HOST manquant"
            missing=1
          fi
          if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
            echo "::error::Secret FTP_USERNAME manquant"
            missing=1
          fi
          if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            echo "::error::Secret FTP_PASSWORD manquant"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
          HOST="${{ secrets.FTP_HOST }}"
          if echo "$HOST" | grep -qE '://|/'; then
            echo "::error::FTP_HOST doit être uniquement l'IP ou le nom (ex. 72.60.93.210), sans ftp://"
            exit 1
          fi
          echo "Secrets OK. Déploiement vers public_html du compte FTP."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP (Hostinger)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          local-dir: ./
          server-dir: ./
          timeout: 600000
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.cursor/**
            **/a-telecharger/**
            **/tools/**
            **/.env
            **/.env.*
            config/config.php
            config/*.local.php
            **/database*.sql
            admin.html
            index.html
            sync-from-github.php
            verification-installation.php
            once-set-admin-password.php
